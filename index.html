<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <h1>Productivity Dashboard</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span class="theme-icon">🌙</span>
            </button>
        </header>
        
        <main class="dashboard-main">
            <section id="greeting-container" class="component-section" aria-label="Greeting and Time">
                <!-- GreetingComponent will be rendered here -->
            </section>
            
            <section id="timer-container" class="component-section" aria-label="Focus Timer">
                <!-- FocusTimerComponent will be rendered here -->
            </section>
            
            <section id="tasks-container" class="component-section" aria-label="Task List">
                <!-- TaskListComponent will be rendered here -->
            </section>
            
            <section id="links-container" class="component-section" aria-label="Quick Links">
                <!-- QuickLinksComponent will be rendered here -->
            </section>
        </main>
    </div>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
